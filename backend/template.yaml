AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Jobs-Matching-Platform

Parameters:
  StageName:
    Type: String
    Default: dev

  ProjectName:
    Type: String
    Default: jobs-matching

  SerpApiKey:
    Type: String
    Description: API Key for SerpAPI (Google Jobs) - stored in SSM Parameter Store
    Default: /jobs-matching/dev/serpapi-key

Globals:
  Function:
    Runtime: nodejs24.x
    Architectures:
      - x86_64
    MemorySize: 256
    Timeout: 30
    LoggingConfig:
      LogFormat: JSON
    Environment:
      Variables:
        STAGE: !Ref StageName

Resources:
# SQS Queues
  RawJobsDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${ProjectName}-raw-jobs-dlq-${StageName}"
      MessageRetentionPeriod: 1209600 # 14 days

  RawJobsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${ProjectName}-raw-jobs-queue-${StageName}"
      VisibilityTimeout: 60 # Should be >= Lambda timeout processing it
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt RawJobsDLQ.Arn
        maxReceiveCount: 3

# DynamoDB Tables
  JobsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${ProjectName}-jobs-${StageName}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: jobId
          AttributeType: S
        - AttributeName: hash
          AttributeType: S
      KeySchema:
        - AttributeName: jobId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: HashIndex
          KeySchema:
            - AttributeName: hash
              KeyType: HASH
          Projection:
            ProjectionType: ALL

# Lambda Functions
  FetchJobsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/functions/fetchJobs/handler.handler
      Description: Fetch jobs from SerpAPI and push to SQS
      Policies:
        - SQSSendMessagePolicy:
            QueueName: !GetAtt RawJobsQueue.QueueName
      Environment:
        Variables:
          QUEUE_URL: !Ref RawJobsQueue
          SERPAPI_KEY: !Ref SerpApiKey
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "es2020"
        Sourcemap: true
        EntryPoints: 
        - src/functions/fetchJobs/handler.ts

  ProcessJobsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/functions/processJobs/handler.handler
      Description: Receive SQS messages and process/forward them
      Policies:
        - LambdaInvokePolicy:
            FunctionName: !Ref NormalizeAndMatchFunction
      Events:
        SQSEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt RawJobsQueue.Arn
            BatchSize: 10
      Environment:
        Variables:
          NORMALIZE_MATCH_FUNCTION_NAME: !Ref NormalizeAndMatchFunction
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "es2020"
        Sourcemap: true
        EntryPoints: 
        - src/functions/processJobs/handler.ts

  NormalizeAndMatchFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/functions/normalizeAndMatch
      Handler: app.lambda_handler
      Runtime: python3.13
      Description: Normalize job and perform deduplication hashing and fuzzy matching
      Timeout: 30
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref JobsTable
      Environment:
        Variables:
          JOBS_TABLE: !Ref JobsTable


Outputs:
  RawJobsQueueUrl:
    Description: "URL of the Raw Jobs SQS Queue"
    Value: !Ref RawJobsQueue
  RawJobsQueueArn:
    Description: "ARN of the Raw Jobs SQS Queue"
    Value: !GetAtt RawJobsQueue.Arn
  FetchJobsFunction:
    Description: "Fetch Jobs Lambda Function ARN"
    Value: !GetAtt FetchJobsFunction.Arn