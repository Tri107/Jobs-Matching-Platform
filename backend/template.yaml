AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Jobs-Matching-Platform

Parameters:
  StageName:
    Type: String
    Default: dev

  ProjectName:
    Type: String
    Default: jobs-matching

  SerpApiKey:
    Type: String
    Description: API Key for SerpAPI (Google Jobs) - stored in SSM Parameter Store
    Default: /jobs-matching/dev/serpapi-key

Globals:
  Function:
    Runtime: nodejs24.x
    Architectures:
      - x86_64
    MemorySize: 256
    Timeout: 30
    LoggingConfig:
      LogFormat: JSON
    Environment:
      Variables:
        STAGE: !Ref StageName

Resources:
# API Gateway
  BackendHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref StageName
      CorsConfiguration:
        AllowOrigins:
          - http://localhost:3000
        AllowHeaders:
          - Content-Type
          - Authorization
        AllowMethods:
          - GET
          - POST
          - DELETE
          - OPTIONS
        MaxAge: 600
      Auth:
        Authorizers:
          CognitoJwtAuthorizer:
            IdentitySource: "$request.header.Authorization"
            JwtConfiguration:
              issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${AuthUserPool}"
              audience:
                - !Ref AuthUserPoolClient

# SQS Queues
  RawJobsDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${ProjectName}-raw-jobs-dlq-${StageName}"
      MessageRetentionPeriod: 1209600 # 14 days

  RawJobsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${ProjectName}-raw-jobs-queue-${StageName}"
      VisibilityTimeout: 60 # Should be >= Lambda timeout processing it
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt RawJobsDLQ.Arn
        maxReceiveCount: 3

# DynamoDB Tables
  JobsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${ProjectName}-jobs-${StageName}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: jobId
          AttributeType: S
        - AttributeName: hash
          AttributeType: S
      KeySchema:
        - AttributeName: jobId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: HashIndex
          KeySchema:
            - AttributeName: hash
              KeyType: HASH
          Projection:
            ProjectionType: ALL

# Lambda Functions
  HealthCheckFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-health-check-${StageName}"
      CodeUri: .
      Handler: src/functions/health/handler.handler
      Description: Public health check endpoint for API Gateway
      Events:
        HealthCheckApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref BackendHttpApi
            Path: /health
            Method: GET
            PayloadFormatVersion: "2.0"
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "es2020"
        Sourcemap: true
        EntryPoints:
          - src/functions/health/handler.ts
          
  GetJobsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-get-jobs-${StageName}"
      CodeUri: .
      Handler: src/functions/jobs/getJobs.handler
      Description: Public endpoint to list jobs from DynamoDB
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref JobsTable
      Environment:
        Variables:
          JOBS_TABLE: !Ref JobsTable
      Events:
        GetJobsApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref BackendHttpApi
            Path: /jobs
            Method: GET
            PayloadFormatVersion: "2.0"
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "es2020"
        Sourcemap: true
        EntryPoints:
          - src/functions/jobs/getJobs.ts

  FetchJobsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-fetch-jobs-${StageName}"
      CodeUri: .
      Handler: src/functions/fetchJobs/handler.handler
      Description: Fetch jobs from SerpAPI and push to SQS
      Timeout: 120
      Policies:
        - SQSSendMessagePolicy:
            QueueName: !GetAtt RawJobsQueue.QueueName
      Environment:
        Variables:
          QUEUE_URL: !Ref RawJobsQueue
          SERPAPI_KEY: !Ref SerpApiKey
      Events:
        DailyFetchJobsSchedule:
          Type: ScheduleV2
          Properties:
            Name: !Sub "${ProjectName}-fetch-jobs-6am-${StageName}"
            Description: "Run FetchJobsFunction every day at 06:00 Vietnam time"
            ScheduleExpression: "cron(0 6 * * ? *)"
            ScheduleExpressionTimezone: "Asia/Ho_Chi_Minh"
            FlexibleTimeWindow:
              Mode: "OFF"
            State: ENABLED
            Input: |
              {
                "source": "eventbridge-scheduler",
                "location": "Vietnam",
               "queries": [
                  "Backend Developer",
                  "Frontend Developer",
                  "Cloud Engineer",
                  "Tester",
                  "Business Analyst",
                  "IT Helpdesk",
                  "Game Developer",
                  "DevOps Engineer"
                ]
              }
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "es2020"
        Sourcemap: true
        EntryPoints: 
        - src/functions/fetchJobs/handler.ts

  ProcessJobsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/functions/processJobs/handler.handler
      Description: Receive SQS messages and process/forward them
      Policies:
        - LambdaInvokePolicy:
            FunctionName: !Ref NormalizeAndMatchFunction
      Events:
        SQSEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt RawJobsQueue.Arn
            BatchSize: 10
      Environment:
        Variables:
          NORMALIZE_MATCH_FUNCTION_NAME: !Ref NormalizeAndMatchFunction
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "es2020"
        Sourcemap: true
        EntryPoints: 
        - src/functions/processJobs/handler.ts

  NormalizeAndMatchFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src
      Handler: functions/normalizeAndMatch/handler.lambda_handler
      Runtime: python3.13
      Description: Normalize job and perform deduplication hashing and fuzzy matching
      Timeout: 30
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref JobsTable
      Environment:
        Variables:
          JOBS_TABLE: !Ref JobsTable

# Cognito Auth
  AuthUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "${ProjectName}-user-pool-${StageName}"
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      MfaConfiguration: "OFF"
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireUppercase: true
          RequireNumbers: true
          RequireSymbols: false
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1
      Schema:
        - Name: email
          Required: true
          Mutable: true

  AuthUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub "${ProjectName}-web-client-${StageName}"
      UserPoolId: !Ref AuthUserPool
      GenerateSecret: false
      PreventUserExistenceErrors: ENABLED
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      AccessTokenValidity: 1
      IdTokenValidity: 1
      RefreshTokenValidity: 30
      TokenValidityUnits:
        AccessToken: hours
        IdToken: hours
        RefreshToken: days

Outputs:
  RawJobsQueueUrl:
    Description: "URL of the Raw Jobs SQS Queue"
    Value: !Ref RawJobsQueue
  RawJobsQueueArn:
    Description: "ARN of the Raw Jobs SQS Queue"
    Value: !GetAtt RawJobsQueue.Arn
  FetchJobsFunction:
    Description: "Fetch Jobs Lambda Function ARN"
    Value: !GetAtt FetchJobsFunction.Arn    
  CognitoUserPoolId:
    Description: "Cognito User Pool ID"
    Value: !Ref AuthUserPool
  CognitoUserPoolClientId:
    Description: "Cognito User Pool App Client ID"
    Value: !Ref AuthUserPoolClient
  CognitoRegion:
    Description: "AWS Region for Cognito"
    Value: !Ref AWS::Region
  ApiGatewayUrl:
    Description: "HTTP API Gateway base URL"
    Value: !Sub "https://${BackendHttpApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}"